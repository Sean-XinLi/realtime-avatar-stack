services:
  streaming-video-server:
    image: ${IMAGE_NAME:-streaming-video-server:local}
    restart: unless-stopped
    gpus: all
    ipc: host
    network_mode: host
    environment:
      STREAM_HOST: 0.0.0.0
      STREAM_PORT: ${STREAM_PORT:-8080}
      STREAM_MODEL_TYPE: ${STREAM_MODEL_TYPE:-lite}
      STREAM_PUBLIC_ORIGIN: ${STREAM_PUBLIC_ORIGIN:-*}
      STREAM_ICE_MODE: ${STREAM_ICE_MODE:-auto}
      STREAM_ICE_SERVER_URLS: ${STREAM_ICE_SERVER_URLS:-stun:stun.l.google.com:19302}
      STREAM_MAX_CONCURRENT_SESSIONS: ${STREAM_MAX_CONCURRENT_SESSIONS:-1}
      STREAM_INFERENCE_WORKERS: ${STREAM_INFERENCE_WORKERS:-1}
      STREAM_STARTUP_WARMUP_RUNS: ${STREAM_STARTUP_WARMUP_RUNS:-1}
      STREAM_CAPTURE_MS: ${STREAM_CAPTURE_MS:-20}
      STREAM_INPUT_CHUNK_MS: ${STREAM_INPUT_CHUNK_MS:-40}
      STREAM_OUTPUT_FPS: ${STREAM_OUTPUT_FPS:-25}
      STREAM_PLAYOUT_BUFFER_MS: ${STREAM_PLAYOUT_BUFFER_MS:-300}
      SOULX_ROOT: /opt/soulx
      SOULX_CKPT_DIR: /models/SoulX-FlashHead-1_3B
      SOULX_WAV2VEC_DIR: /models/wav2vec2-base-960h
      SOULX_COND_IMAGE: /data/avatars
      SOULX_USE_FACE_CROP: ${SOULX_USE_FACE_CROP:-0}
      SOULX_BASE_SEED: ${SOULX_BASE_SEED:-42}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - soulx-models:/models
      - ./assets/avatars:/data/avatars:ro

  model-init:
    image: ${IMAGE_NAME:-streaming-video-server:local}
    environment:
      SOULX_CKPT_DIR: /models/SoulX-FlashHead-1_3B
      SOULX_WAV2VEC_DIR: /models/wav2vec2-base-960h
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_DOWNLOAD_FORCE: ${MODEL_DOWNLOAD_FORCE:-0}
    volumes:
      - soulx-models:/models
    entrypoint: ["/opt/streaming-video-server/scripts/bootstrap_models.sh"]

volumes:
  soulx-models:
